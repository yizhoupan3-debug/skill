interface:
  display_name: "Paper Reviser"
  short_description: "Revise a paper from review findings"
  default_prompt: >-
    Use $paper-reviser when findings or reviewer comments are accepted and the manuscript must
    change now — usually routed by $paper-workbench. Do not ask users to choose this vs $paper-reviewer.
    Honor edit_scope (surgical default). Prefer repair / evidence closure before claim downgrade when
    claim-evidence-ladder says the gap is closable. Honest edits may include repair, narrow, delete,
    de-emphasize, or appendix routing.
