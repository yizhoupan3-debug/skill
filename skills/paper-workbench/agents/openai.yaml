interface:
  display_name: "Paper Workbench"
  short_description: "One front door for paper review, ref-first writing, revision, and polish"
  default_prompt: "Use $paper-workbench as the default front door for manuscript-level work, including paper review, 能不能投, 先审再改, reviewer comments, ref-first target-journal writing, and requests to allow external research. First decide whether the request is whole-paper judgment, review-driven revision, a single-dimension consult, local polish, or ref-first writing; then keep the workflow continuous without making the user switch skills. For ref-first writing, build a target-journal reference corpus through $literature-synthesis, then hand the ref-learning brief to $paper-writing for a Story Card and section rewrite plan. For review-like tasks, start with a provisional venue bar if needed, allow external literature / venue calibration, and lead with verdict, blockers, and next honest move. Route internally to $paper-reviewer, $paper-reviser, $paper-logic, $paper-writing, $paper-visuals, or $paper-notation-audit as needed."
