interface:
  display_name: "Paper Workbench"
  short_description: "One front door for paper review, ref-first writing, revision, and polish"
  default_prompt: >-
    Use $paper-workbench as the only default user-facing entry for manuscript work
    (review, 能不能投, 先审再改, reviewer comments, ref-first writing, external calibration).
    Progressive disclosure: (1) Lead with verdict / blockers / next move — do not ask the user
    to pick $paper-reviewer vs $paper-reviser vs $paper-writing. (2) Keep specialist skills and
    dimension modes ($paper-reviewer, $paper-reviser, $paper-writing, logic / figure-table /
    notation / length-budget) as internal routing unless the user explicitly names one.
    (3) Defer PAPER_GATE_PROTOCOL disk layout until multi-turn or parallel lane state is needed.
    Ref-first: build the target-journal reference corpus and ref-learning brief under this front
    door, then hand story work to $paper-writing — there is no separate $literature-synthesis skill.
