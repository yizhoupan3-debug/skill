title: "Auto-Pagination 压力测试"
subtitle: "验证超量卡片与超密集文本的自动拆分与缩小"
presenter: "PPTX Engine"
date: "2026-03-18"
palette: "dark"
slides:
  - type: "multi-card"
    title: "1. 超载多卡片测试"
    bullets:
      - "卡片一：我们的战略是在接下来的 Q3 和 Q4 获取 30% 增长。"
      - "卡片二：执行策略A需要在三线城市铺开完整的地推网络以获取先发优势。"
      - "卡片三：目前竞品的市场份额是下降的，但私域很强。"
      - "卡片四：价格战不可避免，必须要用第二梯队产品来阻击。"
      - "卡片五（溢出）：这个重点应该被切割到第二页去，不要强行挤压前面的内容。"
      - "卡片六（溢出）：团队的扩张速度赶不上业务，需要紧急引入顾问团队。"

  - type: "image-text-split"
    title: "2. 超长文本拆分测试"
    image: "./assets/placeholder.jpg"
    bullets:
      - "第一段非常长：这种半图半文的结构如果被大量文字塞满会显得极其难看，甚至无法辨认。系统内置的重排逻辑会统计总字符数。当超过容忍阈值（例如单页250个中文字符时），这些段落将被完美切断并克隆当前页的图片产生连续汇报页。"
      - "第二段还在写：为了证明阈值检测的有效性，我们需要尽量多写一些废话来触发条件。在传统的排版引擎里，这些字会被等比缩放到 5pt 导致放映机根本无法播放。"
      - "第三段触发边界：如果我们再加上这第三百个字，那么这页幻灯片的命运就注定要被无情的一刀切断了，这也是为最终演示效果负责。引擎将接管一切。"

  - type: "data-panel"
    title: "3. 数据图表测试但附带超长标签"
    metrics:
      - { value: "30%", label: "这个极其夸张非常冗长根本不应该写在副标题里面的注记会被 SmartTypography 缩小。" }
      - { value: "9%", label: "一般" }
      - { value: "4.5", label: "核心" }
    chart:
      type: "bar"
      categories: ["2023", "2024", "2025"]
      series:
        - { name: "Revenue", values: [120, 240, 310] }

  - type: "multi-card"
    title: "4. 智能字号衰减测试 (Smart Typography)"
    bullets:
      - "这里有一段文字非常密集：通常，我们期望每张卡片不超过 40 个字。但如果用户非要输入超过 80 个字，比如我们现在做的这样。由于卡片不足 5 张，这个幻灯片（也就是这页）不会被触发 Pagination（自动分页），但是这么大的信息量将会溢出这单张卡片的矩形高度。这时候 SmartTypography 工具类会出手，估算这段文字加上间距后需要的高度，并在发现其超过容器 90% 水位线时，激进地自动将其降级，同时打开 Rust PPTX builder 的 auto-fit 兜底。一切都为了这行字不越界。"
      - "正常文本"
