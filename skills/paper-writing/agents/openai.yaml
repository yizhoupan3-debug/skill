interface:
  display_name: "Paper Writing"
  short_description: "Shape paper storytelling and polish bounded manuscript prose"
  default_prompt: >-
    Use $paper-writing for bounded prose and storytelling when claim scope is fixed — often after
    $paper-workbench freezes scope. Do not ask users to pick this as the first entry for vague
    whole-paper tasks. Respect edit_scope (surgical vs refactor) and research-language-norms.
    Do not wordsmith weaker claims to dodge closable evidence gaps (route back for claim decisions).
    Mark missing facts with [VERIFY: ...]; never invent citations or results. When ref corpus exists,
    learn architecture and tone without copying sentences.
