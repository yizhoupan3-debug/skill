interface:
  display_name: "Paper Writing"
  short_description: "Shape paper storytelling and polish bounded manuscript prose"
  default_prompt: "Use $paper-writing for 科研讲故事, 论文故事线, 论文润色, SCI润色, manuscript editing, academic writing, rebuttal/response-letter prose, cover letters, or de-AI cleanup of a bounded academic-paper text block. When a target-journal ref corpus exists, learn its story architecture and claim tone without copying sentences. Keep the scientific boundary fixed, improve reader flow and claim calibration, adapt to the target venue when known, and mark missing facts with [VERIFY: ...] instead of inventing citations, results, or evidence."
