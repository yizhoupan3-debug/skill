name: Evolution Audit

on:
  schedule:
    - cron: '0 8 * * 1'  # every Monday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run evolution audit
        run: |
          python3 scripts/score_skills.py --all --json > /tmp/scores.json
          python3 scripts/evolution_engine.py health --scores /tmp/scores.json
          python3 scripts/evolution_engine.py audit --json > /tmp/audit.json
          python3 scripts/sync_skills.py --apply

      - name: Commit manifest changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add \
            AGENT.md \
            AGENTS.md \
            CLAUDE.md \
            GEMINI.md \
            .mcp.json \
            .claude/CLAUDE.md \
            .claude/settings.json \
            .claude/agents/README.md \
            .claude/hooks/README.md \
            .gemini/settings.json \
            configs/claude/CLAUDE.md \
            configs/codex/AGENTS.md \
            configs/gemini/GEMINI.md \
            skills/SKILL_HEALTH_MANIFEST.json \
            skills/.routing_feedback.md \
            skills/SKILL_ROUTING_REGISTRY.md \
            skills/SKILL_MANIFEST.json \
            skills/SKILL_ROUTING_INDEX.md \
            skills/SKILL_ROUTING_RUNTIME.json
          if git diff --cached --quiet; then
            echo "No automation-generated changes to commit"
          else
            git commit -m "[Auto] Update skill health and routing artifacts"
            git push
          fi

      - name: Generate report & create issue if needed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 -c "
          import json, subprocess, sys

          audit = json.load(open('/tmp/audit.json'))
          health = json.load(open('skills/SKILL_HEALTH_MANIFEST.json'))

          poor = health.get('critical_outliers', [])
          reroutes = audit.get('reroute_count', 0)
          avg_health = health.get('summary', {}).get('avg_health', 0)

          if not poor and reroutes == 0 and avg_health > 90:
              print('All clear — no issues to report.')
              sys.exit(0)

          body = '## Weekly Skill Evolution Audit\n\n'
          body += f'- Average Health: {avg_health}/100\n'
          body += f'- Critical Outliers: {len(poor)}\n'
          body += f'- Routing Reroutes (last 30d): {reroutes}\n\n'

          if poor:
              body += '### Skills needing evolution\n\n'
              for s in poor:
                  detail = health['skills'][s]
                  body += f'- \`{s}\`: {detail[\"dynamic_score\"]}/100 (Static: {detail.get(\"static_score\", \"?\")})\n'

          if audit.get('repair_suggestions'):
              body += '\n### 🛠️ Suggested repairs\n\n'
              for s in audit['repair_suggestions']:
                  body += f'- {s[\"suggestion\"]}\n'

          if audit.get('new_skill_candidates'):
              body += '\n### 🌊 待批阅工作流 (Potential New Skills)\n\n'
              body += '以下工作流在过去一段时间内高频出现且未被现有技能精准覆盖，请批阅是否凝结为新 Skill：\n\n'
              for c in audit['new_skill_candidates']:
                  body += f'- **{c[\"suggested_name\"]}** (模式: `\"{c[\"phrase\"]}\"`, 出现 {c[\"count\"]} 次)\n'
                  body += f'  - 原因: {c[\"reason\"]}\n'
                  body += f'  - 示例任务: \n'
                  for task in c['example_tasks']:
                      body += f'    - {task}\n'
              body += '\n> [!TIP]\n'
              body += '> 如需凝结，请使用 `$skill-developer` 并参考本期审计报告进行标准化生成。\n'

          subprocess.run([
              'gh', 'issue', 'create',
              '--title', f'[Auto] Skill evolution: {len(poor)} outliers, {reroutes} reroutes',
              '--body', body,
              '--label', 'skill-maintenance',
          ], check=False)
          "
