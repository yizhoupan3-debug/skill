name: Skill CI

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/**'
      - 'rust_tools/**'
      - 'tests/**'
      - 'AGENT.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'GEMINI.md'
      - '.mcp.json'
      - '.claude/**'
      - '.gemini/**'
      - 'configs/claude/**'
      - 'configs/codex/**'
      - 'configs/gemini/**'
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/**'
      - 'rust_tools/**'
      - 'tests/**'
      - 'AGENT.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'GEMINI.md'
      - '.mcp.json'
      - '.claude/**'
      - '.gemini/**'
      - 'configs/claude/**'
      - 'configs/codex/**'
      - 'configs/gemini/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Compile skill registry
        run: |
          cargo run --manifest-path scripts/skill-compiler-rs/Cargo.toml -- \
            --skills-root skills \
            --source-manifest skills/SKILL_SOURCE_MANIFEST.json \
            --health-manifest skills/SKILL_HEALTH_MANIFEST.json \
            --apply

      - name: Run Rust policy tests
        run: cargo test --test policy_contracts

      - name: Check generated artifact drift
        run: |
          cargo run --manifest-path scripts/skill-compiler-rs/Cargo.toml -- \
            --skills-root skills \
            --source-manifest skills/SKILL_SOURCE_MANIFEST.json \
            --health-manifest skills/SKILL_HEALTH_MANIFEST.json \
            --apply
          if ! git diff --quiet -- skills/SKILL_ROUTING_REGISTRY.md skills/SKILL_MANIFEST.json skills/SKILL_ROUTING_INDEX.md skills/SKILL_ROUTING_RUNTIME.json skills/SKILL_SOURCE_MANIFEST.json skills/SKILL_SHADOW_MAP.json skills/SKILL_LOADOUTS.json skills/SKILL_APPROVAL_POLICY.json skills/SKILL_HEALTH_MANIFEST.json AGENT.md AGENTS.md CLAUDE.md GEMINI.md .mcp.json .claude/CLAUDE.md .claude/settings.json .claude/agents/README.md .claude/hooks/README.md .gemini/settings.json configs/claude/CLAUDE.md configs/codex/AGENTS.md configs/gemini/GEMINI.md; then
            echo "::error::Generated skill artifacts or shared CLI entrypoints are out of date. Run scripts/skill-compiler-rs with --apply locally."
            exit 1
          fi
