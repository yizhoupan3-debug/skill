name: Skill CI

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/**'
      - 'rust_tools/**'
      - 'tests/**'
      - '.cursor/**'
      - '.github/workflows/**'
      - 'AGENTS.md'
      - '.codex/**'
      - 'configs/codex/**'
      - 'configs/framework/**'
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/**'
      - 'rust_tools/**'
      - 'tests/**'
      - '.cursor/**'
      - '.github/workflows/**'
      - 'AGENTS.md'
      - '.codex/**'
      - 'configs/codex/**'
      - 'configs/framework/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Compile skill registry
        run: |
          cargo run --manifest-path scripts/skill-compiler-rs/Cargo.toml -- \
            --skills-root skills \
            --source-manifest skills/SKILL_SOURCE_MANIFEST.json \
            --apply

      - name: Run Rust policy tests
        run: cargo test --test policy_contracts

      - name: Run host integration tests
        run: cargo test --test host_integration

      - name: Run browser MCP integration tests
        run: cargo test --test browser_mcp_scripts

      - name: Run router-rs crate tests
        run: cargo test --manifest-path scripts/router-rs/Cargo.toml

      - name: Verify Cursor hooks wiring
        run: bash scripts/verify_cursor_hooks.sh

      - name: Run Codex hook installer tests
        run: python3 .cursor/hook-tests/test_install_codex_cli_hooks.py

      - name: Check generated artifact drift
        run: |
          cargo run --manifest-path scripts/skill-compiler-rs/Cargo.toml -- \
            --skills-root skills \
            --source-manifest skills/SKILL_SOURCE_MANIFEST.json \
            --apply
          cargo build --release --manifest-path scripts/router-rs/Cargo.toml
          ./scripts/router-rs/target/release/router-rs \
            framework host-integration generated-artifacts-status \
            --framework-root "$PWD" > generated-artifacts-status.json
          python - <<'PY'
          import json
          import sys

          with open("generated-artifacts-status.json", "r", encoding="utf-8") as handle:
              status = json.load(handle)
          if not status.get("ok"):
              print(json.dumps(status.get("manifest_status", {}), ensure_ascii=False, indent=2))
              for artifact in status.get("generated_artifacts", []):
                  if not artifact.get("clean"):
                      print(json.dumps(artifact, ensure_ascii=False, indent=2))
              sys.exit(1)
          PY
          mapfile -t generated_paths < <(jq -r '.generated_artifacts[].path' configs/framework/GENERATED_ARTIFACTS.json)
          if ! git diff --quiet -- "${generated_paths[@]}"; then
            echo "::error::Generated skill artifacts or shared CLI entrypoints are out of date after regeneration."
            exit 1
          fi
