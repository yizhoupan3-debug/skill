#:schema https://developers.openai.com/codex/config-schema.json

# Repo-local Codex overlay for this repository.
# Keep only repository-scoped settings here.
# Machine-wide defaults belong in ~/.codex/config.toml.

[features]
hooks = true
memories = false

[memories]
use_memories = false
generate_memories = false

model = "gpt-5.5"
model_reasoning_effort = "high"
