# CLIProxyAPI Configuration

server:
  port: 8317
  host: "0.0.0.0"

api-keys:
  - "__OPENAI_PROXY_API_KEY__"

# 令牌目录：将所有 Plus 账号的 .json 令牌放入此目录
auth-dir: "./auths"

# 默认走 OpenAI 兼容入口
default-provider: "openai"

# 负载均衡策略: round-robin (轮询)
# 也可以选择 "weight" 或 "least-request"
load-balancing: "round-robin"

# 启用管理界面
management:
  enabled: true
  path: "/management.html"
